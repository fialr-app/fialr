name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      # The gitleaks GitHub Action now requires a paid license for orgs; the
      # OSS binary is free. Same .gitleaks.toml, full-history scan.
      - name: gitleaks (binary)
        run: |
          ver=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --config .gitleaks.toml
