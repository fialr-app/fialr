name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      # gitleaks/gitleaks-action requires a paid license under an org; the OSS
      # binary is free. Pin the version AND verify its sha256 (supply-chain).
      - name: gitleaks (pinned, sha256-verified)
        run: |
          ver=8.30.1
          sha=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" -o "$RUNNER_TEMP/gitleaks.tar.gz"
          echo "${sha}  ${RUNNER_TEMP}/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version
          "$RUNNER_TEMP/gitleaks" git --config .gitleaks.toml --no-banner --redact
