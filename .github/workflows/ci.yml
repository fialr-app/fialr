name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    # Name kept as the ruleset's required-check context. The MkDocs build was
    # retired (docs live at fialr.com); this now runs the parity check only.
    name: docs parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Doc-parity (README/CHANGELOG reference only real commands)
        run: python scripts/check_docs_parity.py
      - name: Claude skill system is current
        run: python scripts/check_skills.py
