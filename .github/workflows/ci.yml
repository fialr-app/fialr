name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    # Name kept as the ruleset's required-check context. The MkDocs build was
    # retired (docs live at fialr.com); this now runs the parity check only.
    name: docs parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Doc-parity (README/CHANGELOG reference only real commands)
        run: python scripts/check_docs_parity.py
      - name: Claude skill system is current
        run: python scripts/check_skills.py
